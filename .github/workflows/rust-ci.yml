name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_retained_validation:
        description: Run retained end-to-end validation
        required: false
        default: "true"
      run_capos_target_compile:
        description: Run CapOS target package compile matrix
        required: false
        default: "true"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-style:
    name: Rust format, lint, docs
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: scripts/ci/install-deps.sh

      - name: Install Rust toolchain
        run: scripts/ci/install-rust.sh stable rustfmt clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build documentation with warnings denied
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps

  rust-unit:
    name: Rust tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: scripts/ci/install-deps.sh

      - name: Install Rust toolchain
        run: scripts/ci/install-rust.sh stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-unit-${{ matrix.arch }}

      - name: Run tests
        run: cargo test --all-targets --all-features -- --test-threads=1

      - name: Build release binary
        run: cargo build --release --all-targets --all-features

  cli-feature-matrix:
    name: CLI feature matrix (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: scripts/ci/install-deps.sh

      - name: Install Rust toolchain
        run: scripts/ci/install-rust.sh stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-feature-${{ matrix.arch }}

      - name: Run host feature checks
        env:
          ARGOSFS_TEST_ARTIFACTS: ${{ runner.temp }}/argosfs-cli-features-${{ matrix.arch }}
        run: scripts/tests/host/cli_features.sh

      - name: Upload feature artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: argosfs-cli-features-${{ matrix.arch }}
          path: ${{ runner.temp }}/argosfs-cli-features-${{ matrix.arch }}
          if-no-files-found: ignore

  block-lifecycle-matrix:
    name: Block lifecycle matrix (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: scripts/ci/install-deps.sh

      - name: Install Rust toolchain
        run: scripts/ci/install-rust.sh stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: block-lifecycle-${{ matrix.arch }}

      - name: Run loop block lifecycle checks
        env:
          ARGOSFS_TEST_ARTIFACTS: ${{ runner.temp }}/argosfs-block-lifecycle-${{ matrix.arch }}
        run: scripts/tests/host/block_lifecycle.sh

      - name: Upload block lifecycle artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: argosfs-block-lifecycle-${{ matrix.arch }}
          path: ${{ runner.temp }}/argosfs-block-lifecycle-${{ matrix.arch }}
          if-no-files-found: ignore

  compatibility:
    name: Compatibility and rootfs checks (${{ matrix.suite }})
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: loop-backend
            command: scripts/tests/host/loop_backend.sh
          - suite: crash-consistency
            command: scripts/tests/host/crash_consistency.sh --unprivileged
          - suite: initramfs-dry-run
            command: scripts/tests/host/initramfs_dry_run.sh
          - suite: rootfs-smoke
            command: scripts/tests/host/rootfs_smoke.sh
          - suite: mounted-fuse
            command: scripts/tests/host/privileged_fuse.sh
          - suite: mounted-permissions
            command: scripts/tests/host/permission_compat.sh
          - suite: randomized-model
            command: scripts/tests/host/randomized_model.sh
          - suite: pjdfstest
            command: scripts/tests/host/pjdfstest_compat.sh "$RUNNER_TEMP/pjdfstest.jsonl"
    steps:
      - name: Checkout
        uses: actions/checkout@v7


      - name: Checkout pjdfstest
        if: matrix.suite == 'pjdfstest'
        uses: actions/checkout@v7
        with:
          repository: pjd/pjdfstest
          path: external/pjdfstest

      - name: Install system dependencies
        run: scripts/ci/install-deps.sh

      - name: Install Rust toolchain
        run: scripts/ci/install-rust.sh stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: compat-${{ matrix.suite }}

      - name: Run compatibility suite
        env:
          PJDFSTEST_ROOT: ${{ github.workspace }}/external/pjdfstest
        run: ${{ matrix.command }}

      - name: Upload compatibility artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: argosfs-compat-${{ matrix.suite }}
          path: |
            ${{ runner.temp }}/pjdfstest.jsonl
            ${{ runner.temp }}/pjdfstest.log
            target/argosfs-test-artifacts
          if-no-files-found: ignore

  retained-validation:
    name: Retained end-to-end validation
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    if: github.event_name != 'workflow_dispatch' || inputs.run_retained_validation == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: scripts/ci/install-deps.sh

      - name: Install Rust toolchain
        run: scripts/ci/install-rust.sh stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: retained-validation

      - name: Check validation script syntax
        run: python3 -m py_compile scripts/validation/run_full_validation.py scripts/compat/mounted_fuse_ops.py

      - name: Check shell syntax
        run: |
          sh -n integrations/generic/initramfs/argosfs-root.sh integrations/capos/initramfs/argosfs-root.sh integrations/capos/initramfs/hooks/argosfs
          find scripts -name '*.sh' -print0 | xargs -0 bash -n

      - name: Run retained validation workflow
        run: python3 scripts/validation/run_full_validation.py --output "$RUNNER_TEMP/argosfs-validation"

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: argosfs-validation
          path: ${{ runner.temp }}/argosfs-validation
          if-no-files-found: ignore

  qemu-harness:
    name: QEMU harness (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
          - arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: scripts/ci/install-deps.sh

      - name: Check QEMU scripts
        run: bash -n scripts/qemu/boot.sh scripts/qemu/ops.sh scripts/qemu/hotplug.sh

      - name: Probe QEMU binary
        env:
          ARGOSFS_QEMU_ARCH: ${{ matrix.arch }}
        run: |
          case "$ARGOSFS_QEMU_ARCH" in
            x86_64) qemu-system-x86_64 --version ;;
            arm64) qemu-system-aarch64 --version ;;
          esac

      - name: Run artifact-gated QEMU boot probe
        env:
          ARGOSFS_QEMU_ARCH: ${{ matrix.arch }}
          ARGOSFS_TEST_ARTIFACTS: ${{ runner.temp }}/argosfs-qemu-${{ matrix.arch }}
        run: scripts/qemu/boot.sh

      - name: Run artifact-gated QEMU ops probe
        env:
          ARGOSFS_QEMU_ARCH: ${{ matrix.arch }}
          ARGOSFS_TEST_ARTIFACTS: ${{ runner.temp }}/argosfs-qemu-${{ matrix.arch }}
        run: scripts/qemu/ops.sh

      - name: Run artifact-gated QEMU hotplug probe
        env:
          ARGOSFS_QEMU_ARCH: ${{ matrix.arch }}
          ARGOSFS_TEST_ARTIFACTS: ${{ runner.temp }}/argosfs-qemu-${{ matrix.arch }}
        run: scripts/qemu/hotplug.sh

      - name: Upload QEMU artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: argosfs-qemu-${{ matrix.arch }}
          path: ${{ runner.temp }}/argosfs-qemu-${{ matrix.arch }}
          if-no-files-found: ignore

  capos-target-compile:
    name: CapOS target compile (${{ matrix.capos_target }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    if: github.event_name != 'workflow_dispatch' || inputs.run_capos_target_compile == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - capos_target: x86_64
            arch: x86_64
          - capos_target: armsr_armv8
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install CapOS package build prerequisites
        run: scripts/ci/install-deps.sh

      - name: Install Rust toolchain
        run: scripts/ci/install-rust.sh stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: capos-${{ matrix.capos_target }}

      - name: Run ArgosFS compile inside CapOS environment
        env:
          ARGOSFS_CAPOS_TARGET_MATRIX: ${{ matrix.capos_target }}
          ARGOSFS_CAPOS_BUILD_TARGET: ${{ matrix.capos_target }}
          ARGOSFS_CAPOS_MAKE_JOBS: "2"
          ARGOSFS_CAPOS_MAKE_V: s
          ARGOSFS_CAPOS_LOG_STDOUT: periodic
          ARGOSFS_CI_LOG_INTERVAL_S: "120"
          ARGOSFS_CI_LOG_TAIL_LINES: "35"
          ARGOSFS_TEST_ARTIFACTS: ${{ runner.temp }}/argosfs-capos-${{ matrix.capos_target }}
        run: scripts/qemu/capos_build.sh

      - name: Upload CapOS artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: argosfs-capos-${{ matrix.capos_target }}
          path: ${{ runner.temp }}/argosfs-capos-${{ matrix.capos_target }}
          if-no-files-found: ignore

  required-rust-compat:
    name: Format, lint, test, doc, release build
    runs-on: ubuntu-24.04
    needs:
      - rust-style
      - rust-unit
      - cli-feature-matrix
      - block-lifecycle-matrix
      - compatibility
      - retained-validation
      - qemu-harness
    if: always()
    steps:
      - name: Verify required Rust CI gates
        run: |
          python3 - <<'PY'
          import json
          import os
          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {name: result["result"] for name, result in needs.items() if result["result"] != "success"}
          if failed:
              raise SystemExit(f"required Rust CI gates did not all pass: {failed}")
          print("required Rust CI gates passed")
          PY
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}

  required-capos-compat:
    name: CapOS environment compile smoke
    runs-on: ubuntu-24.04
    needs:
      - capos-target-compile
    if: always()
    steps:
      - name: Verify required CapOS compile gates
        run: |
          python3 - <<'PY'
          import json
          import os
          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {name: result["result"] for name, result in needs.items() if result["result"] != "success"}
          if failed:
              raise SystemExit(f"required CapOS compile gates did not all pass: {failed}")
          print("required CapOS compile gates passed")
          PY
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}

