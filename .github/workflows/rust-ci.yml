name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Format, lint, test, doc, release build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libfuse3-dev fuse3 attr acl smartmontools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --all-features

      - name: Run loop block backend smoke
        run: scripts/test_loop_backend.sh

      - name: Run crash consistency dry-run checks
        run: scripts/test_crash_consistency.sh --unprivileged

      - name: Run initramfs dry-run
        run: scripts/test_initramfs_dry_run.sh

      - name: Run rootfs smoke
        run: scripts/test_rootfs_smoke.sh

      - name: Build documentation with warnings denied
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps

      - name: Build release binary
        run: cargo build --release --all-targets --all-features

      - name: Run mounted FUSE compatibility checks when available
        run: scripts/compat/run_mounted_fuse_compat.sh

      - name: Record pjdfstest compatibility status
        run: scripts/compat/run_pjdfstest.sh "$RUNNER_TEMP/pjdfstest.jsonl"

      - name: Upload compatibility artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: argosfs-compatibility
          path: |
            ${{ runner.temp }}/pjdfstest.jsonl
            ${{ runner.temp }}/pjdfstest.log
          if-no-files-found: ignore

  retained-validation:
    name: Retained end-to-end validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libfuse3-dev fuse3 attr acl smartmontools python3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check Python validation script syntax
        run: python3 -m py_compile scripts/run_full_validation.py

      - name: Check initramfs shell syntax
        run: bash -n contrib/initramfs/argosfs-root.sh contrib/capos/initramfs/argosfs-root.sh contrib/capos/initramfs/hooks/argosfs scripts/test_loop_backend.sh scripts/test_crash_consistency.sh scripts/test_initramfs_dry_run.sh scripts/test_rootfs_smoke.sh scripts/test_privileged_fuse.sh scripts/test_raw_backend.sh scripts/test_qemu_boot.sh scripts/test_capos_build.sh

      - name: Run retained validation workflow
        run: python3 scripts/run_full_validation.py --output "$RUNNER_TEMP/argosfs-validation"

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: argosfs-validation
          path: ${{ runner.temp }}/argosfs-validation
          if-no-files-found: ignore

  capos-package-compile:
    name: CapOS environment compile smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install CapOS package build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3 rsync unzip zlib1g-dev file wget pkg-config libfuse3-dev fuse3

      - name: Run ArgosFS compile inside CapOS environment
        run: scripts/test_capos_build.sh
