name: Apply batched replacement fix (observable)

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-batched-replacement-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'ci/ext4-performance-report'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply and validate fix
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/apply_batched_replacement_fix.py
          cargo fmt --all
          cargo test --locked --test integration loop_block_remove_batches_migration_checkpoint -- --test-threads=1
          bash -n scripts/qemu/mixed_chaos.sh
          git diff --check

          git config user.name "Cao Yuhang"
          git config user.email "caoyuhang@fwerkor.com"
          git add -A
          git commit -m "fix: batch block-device replacement migration"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
