name: Apply batched replacement fix (observable)

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-batched-replacement-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'ci/ext4-performance-report'
    runs-on: ubuntu-24.04
    steps:
      - name: Apply and validate fix
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git clone --quiet --branch "$HEAD_BRANCH" "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          python3 .github/apply_batched_replacement_fix.py
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse3-dev pkg-config
          cargo fmt --all
          cargo test --quiet --locked --test integration loop_block_remove_batches_migration_checkpoint -- --test-threads=1
          bash -n scripts/qemu/mixed_chaos.sh
          git diff --check
          git config user.name "Cao Yuhang"
          git config user.email "caoyuhang@fwerkor.com"
          git add -A
          git commit --quiet -m "fix: batch block-device replacement migration"
          git push --quiet origin HEAD:"$HEAD_BRANCH"
