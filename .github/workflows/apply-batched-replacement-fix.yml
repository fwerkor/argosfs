name: Apply batched replacement fix

on:
  push:
    branches:
      - ci/ext4-performance-report

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply and validate fix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement, found {count}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1))

          replace_once(
              "src/volume/maintenance.rs",
              "    pub fn drain_disk(&self, disk_id: &str) -> Result<u64> {\n",
              """    pub fn drain_disk(&self, disk_id: &str) -> Result<u64> {
                  self.run_batched_block_maintenance(|| self.drain_disk_unbatched(disk_id))
              }

              fn drain_disk_unbatched(&self, disk_id: &str) -> Result<u64> {
          """,
          )
          replace_once(
              "src/volume/maintenance.rs",
              """    pub fn remove_disk(&self, disk_id: &str) -> Result<u64> {
                  let rewritten = self.drain_disk(disk_id)?;
          """,
              """    pub fn remove_disk(&self, disk_id: &str) -> Result<u64> {
                  self.run_batched_block_maintenance(|| self.remove_disk_unbatched(disk_id))
              }

              fn remove_disk_unbatched(&self, disk_id: &str) -> Result<u64> {
                  let rewritten = self.drain_disk_unbatched(disk_id)?;
          """,
          )
          replace_once(
              "src/volume/maintenance.rs",
              """        Ok(rewritten)
              }

              pub fn rebalance(&self) -> Result<u64> {
          """,
              """        Ok(rewritten)
              }

              fn run_batched_block_maintenance<T>(
                  &self,
                  operation: impl FnOnce() -> Result<T>,
              ) -> Result<T> {
                  let should_batch = {
                      let meta = self.meta.read();
                      meta.backend != BackendKind::Host && !bulk_import_enabled()
                  };
                  if !should_batch {
                      return operation();
                  }

                  let _batch = bulk_import_scope(true);
                  let result = operation()?;
                  self.sync()?;
                  Ok(result)
              }

              pub fn rebalance(&self) -> Result<u64> {
          """,
          )

          replace_once(
              "scripts/qemu/mixed_chaos.sh",
              """echo ARGOSFS_CHAOS_DEGRADED_READ_OK
          : >\"\\$stop\"
          wait
          echo ARGOSFS_CHAOS_WORKLOAD_STOPPED
          argosfs replace-device --backend raw --devices \"\\$survivors\" --old disk-0001 --new /dev/vdg --force >/tmp/argosfs-chaos-replace.json
          repaired=\"\\$survivors,/dev/vdg\"
          argosfs fsck --backend raw --devices \"\\$repaired\" --repair --remove-orphans >/tmp/argosfs-chaos-fsck.json
          argosfs scrub --backend raw --devices \"\\$repaired\" >/tmp/argosfs-chaos-scrub.json
          """,
              """echo ARGOSFS_CHAOS_DEGRADED_READ_OK
          echo ARGOSFS_CHAOS_REPLACE_BEGIN
          argosfs replace-device --backend raw --devices \"\\$survivors\" --old disk-0001 --new /dev/vdg --force >/tmp/argosfs-chaos-replace.json
          echo ARGOSFS_CHAOS_REPLACE_OK
          repaired=\"\\$survivors,/dev/vdg\"
          echo ARGOSFS_CHAOS_FSCK_BEGIN
          argosfs fsck --backend raw --devices \"\\$repaired\" --repair --remove-orphans >/tmp/argosfs-chaos-fsck.json
          echo ARGOSFS_CHAOS_FSCK_OK
          echo ARGOSFS_CHAOS_SCRUB_BEGIN
          argosfs scrub --backend raw --devices \"\\$repaired\" >/tmp/argosfs-chaos-scrub.json
          echo ARGOSFS_CHAOS_SCRUB_OK
          """,
          )
          replace_once(
              "scripts/qemu/mixed_chaos.sh",
              "for marker in ARGOSFS_CHAOS_BASELINE_OK ARGOSFS_CHAOS_WORKLOAD_STARTED ARGOSFS_CHAOS_DEVICE_LOSS_OBSERVED ARGOSFS_CHAOS_DEGRADED_READ_OK ARGOSFS_CHAOS_WORKLOAD_STOPPED ARGOSFS_CHAOS_REPLACEMENT_REPAIR_OK ARGOSFS_CHAOS_READY_FOR_HARD_KILL; do",
              "for marker in ARGOSFS_CHAOS_BASELINE_OK ARGOSFS_CHAOS_WORKLOAD_STARTED ARGOSFS_CHAOS_DEVICE_LOSS_OBSERVED ARGOSFS_CHAOS_DEGRADED_READ_OK ARGOSFS_CHAOS_REPLACE_OK ARGOSFS_CHAOS_FSCK_OK ARGOSFS_CHAOS_SCRUB_OK ARGOSFS_CHAOS_REPLACEMENT_REPAIR_OK ARGOSFS_CHAOS_READY_FOR_HARD_KILL; do",
          )

          replace_once(
              ".github/workflows/capos-full-qemu.yml",
              """            qemu_timeout: \"6000\"
                      chaos_workers: \"2\"
                      stress_seconds: \"\"
          """,
              """            qemu_timeout: \"4200\"
                      stress_seconds: \"\"
          """,
          )

          test_path = Path("tests/integration/block_backend.rs")
          test_text = test_path.read_text()
          test_name = "loop_block_remove_batches_migration_checkpoint"
          if test_name in test_text:
              raise SystemExit(f"duplicate test {test_name}")
          test_text += r'''

          #[test]
          fn loop_block_remove_batches_migration_checkpoint() {
              let tmp = TempDir::new().unwrap();
              let images = loop_images(&tmp, 4);
              let fs = ArgosFs::create_loop(
                  &images,
                  config(2, 1),
                  64 * 1024 * 1024,
                  "batched-remove",
                  false,
              )
              .unwrap();
              let payloads = (0..24)
                  .map(|index| {
                      let payload = vec![index as u8; 4096 + index * 17];
                      fs.write_file(&format!("/file-{index:02}"), &payload, 0o644)
                          .unwrap();
                      payload
                  })
                  .collect::<Vec<_>>();
              fs.sync().unwrap();
              let before = fs.transaction_report().unwrap().valid_entries;

              let rewritten = fs.remove_disk("disk-0000").unwrap();
              assert!(rewritten > 0);
              let meta = fs.metadata_snapshot();
              assert_eq!(meta.disks["disk-0000"].status, DiskStatus::Removed);
              assert!(meta.inodes.values().flat_map(|inode| &inode.blocks).all(|block| {
                  block
                      .shards
                      .iter()
                      .all(|shard| shard.disk_id != "disk-0000")
              }));
              let after = fs.transaction_report().unwrap().valid_entries;
              assert_eq!(after, before, "drain rewrites must be checkpointed as one batch");
              drop(fs);

              let survivors = images[1..].to_vec();
              let reopened = ArgosFs::open_loop(&survivors, false).unwrap();
              for (index, payload) in payloads.iter().enumerate() {
                  assert_eq!(
                      reopened.read_file(&format!("/file-{index:02}"), true).unwrap(),
                      payload.as_slice()
                  );
              }
              assert!(reopened.fsck(false, false).unwrap().errors.is_empty());
          }
          '''
          test_path.write_text(test_text)

          Path(".github/workflows/apply-batched-replacement-fix.yml").unlink()
          PY

          cargo fmt --all
          cargo test --locked --test integration loop_block_remove_batches_migration_checkpoint -- --test-threads=1
          bash -n scripts/qemu/mixed_chaos.sh
          git diff --check

          git config user.name "Cao Yuhang"
          git config user.email "caoyuhang@fwerkor.com"
          git add -A
          git commit -m "fix: batch block-device replacement migration"
          git push origin HEAD:${GITHUB_REF_NAME}
