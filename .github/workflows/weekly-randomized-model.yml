name: Weekly randomized model stress

on:
  schedule:
    - cron: "20 19 * * 6"
  workflow_dispatch:
    inputs:
      ops:
        description: Number of randomized operations per seed
        required: false
        default: "1200"
      seed_count:
        description: Number of fresh random seeds when replay seeds are not supplied
        required: false
        default: "12"
      seeds:
        description: Optional comma-separated replay seeds; leave empty for fresh random seeds
        required: false
        default: ""
      max_file_size:
        description: Maximum generated file size in bytes
        required: false
        default: "131072"

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-matrix:
    name: Prepare randomized seed matrix
    runs-on: ubuntu-24.04
    outputs:
      seeds: ${{ steps.seeds.outputs.seeds }}
      seed_source: ${{ steps.seeds.outputs.source }}
      seed_count: ${{ steps.seeds.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate and record seed matrix
        id: seeds
        env:
          REQUESTED_SEEDS: ${{ github.event_name == 'workflow_dispatch' && inputs.seeds || '' }}
          REQUESTED_SEED_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.seed_count || '12' }}
          SEED_MANIFEST: ${{ runner.temp }}/weekly-random-seeds.json
        run: |
          python3 scripts/ci/generate-random-seeds.py \
            --count "$REQUESTED_SEED_COUNT" \
            --seeds "$REQUESTED_SEEDS" \
            --manifest "$SEED_MANIFEST" \
            --github-output "$GITHUB_OUTPUT"
          cat "$SEED_MANIFEST"
          {
            echo "### Weekly randomized seed matrix"
            echo
            echo "- Source: ${{ steps.seeds.outputs.source }}"
            echo "- Count: ${{ steps.seeds.outputs.count }}"
            echo "- Manifest artifact: weekly-random-seed-manifest"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload seed manifest
        uses: actions/upload-artifact@v7
        with:
          name: weekly-random-seed-manifest
          path: ${{ runner.temp }}/weekly-random-seeds.json
          if-no-files-found: error

  randomized-model-stress:
    name: Randomized model stress (${{ matrix.arch }}, ${{ matrix.seed }})
    needs: prepare-matrix
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 210
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
        seed: ${{ fromJSON(needs.prepare-matrix.outputs.seeds) }}
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: scripts/ci/install-deps.sh

      - name: Install Rust toolchain
        run: scripts/ci/install-rust.sh stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: weekly-randomized-model-${{ matrix.arch }}

      - name: Run high-intensity randomized model stress
        env:
          ARGOSFS_TEST_ARTIFACTS: ${{ runner.temp }}/weekly-randomized-model-${{ matrix.arch }}-${{ matrix.seed }}
          ARGOSFS_RANDOM_MODEL_OPS: ${{ github.event_name == 'workflow_dispatch' && inputs.ops || '1200' }}
          ARGOSFS_RANDOM_MODEL_CHECK_INTERVAL: "100"
          ARGOSFS_RANDOM_MODEL_MAX_FILE_SIZE: ${{ github.event_name == 'workflow_dispatch' && inputs.max_file_size || '131072' }}
          ARGOSFS_RANDOM_MODEL_SEEDS: ${{ matrix.seed }}
          ARGOSFS_RANDOM_MODEL_DISKS: "6"
          ARGOSFS_RANDOM_MODEL_K: "4"
          ARGOSFS_RANDOM_MODEL_M: "2"
          ARGOSFS_RANDOM_MODEL_CHUNK_SIZE: "65536"
        run: scripts/tests/host/randomized_model.sh

      - name: Upload randomized model artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: weekly-randomized-model-${{ matrix.arch }}-${{ matrix.seed }}
          path: ${{ runner.temp }}/weekly-randomized-model-${{ matrix.arch }}-${{ matrix.seed }}
          if-no-files-found: ignore

  block-fault-injection:
    name: Raw block EIO and corruption injection
    needs: prepare-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: scripts/ci/install-deps.sh

      - name: Install Rust toolchain
        run: scripts/ci/install-rust.sh stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: weekly-block-fault-injection

      - name: Inject block EIO and raw corruption
        env:
          ARGOSFS_TEST_ARTIFACTS: ${{ runner.temp }}/weekly-block-fault-injection
          ARGOSFS_REQUIRE_BLOCK_FAULTS: "1"
          ARGOSFS_BLOCK_FAULT_SEED: ${{ fromJSON(needs.prepare-matrix.outputs.seeds)[0] }}
        run: scripts/tests/host/block_fault_injection.sh

      - name: Upload block fault artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: weekly-block-fault-injection
          path: ${{ runner.temp }}/weekly-block-fault-injection
          if-no-files-found: error

  open-issue-on-failure:
    name: Open issue on weekly failure
    needs:
      - prepare-matrix
      - randomized-model-stress
      - block-fault-injection
    if: ${{ always() && github.event_name == 'schedule' && (needs.prepare-matrix.result != 'success' || needs.randomized-model-stress.result != 'success' || needs.block-fault-injection.result != 'success') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Open or update failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
          TITLE: Weekly randomized model CI failure
        run: |
          set -euo pipefail
          existing="$(gh issue list --repo "$REPO" --state open --search "\"$TITLE\" in:title" --json number --jq '.[0].number // empty')"
          body="$(cat <<EOF
          Weekly randomized model stress failed or was cancelled.

          - Run: $RUN_URL
          - Commit: $HEAD_SHA
          - Workflow: $GITHUB_WORKFLOW
          - Run ID: $GITHUB_RUN_ID

          Each architecture/seed pair runs as an independent shard. Download `weekly-random-seed-manifest` for the complete generated seed set. Each shard artifact contains operation logs, command logs, metadata, and exported-tree checkpoints. Reproduce with the seed and environment values recorded in `logs/metadata.json`.
          EOF
          )"
          if [ -n "$existing" ]; then
            gh issue comment --repo "$REPO" "$existing" --body "$body"
          else
            gh issue create --repo "$REPO" --title "$TITLE" --body "$body"
          fi
